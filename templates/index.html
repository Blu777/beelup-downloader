№╗┐<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B-Downloader ├бРѓгРђю Biblioteca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d1117; --surface: #161b22; --surf2: #21262d;
            --border: rgba(255,255,255,0.08);
            --accent: #6366f1; --accent2: #a855f7;
            --text: #e6edf3; --muted: rgba(230,237,243,0.45);
            --danger: #ef4444;
        }
        html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; }

        /* ├бРђЮРѓг├бРђЮРѓг Header ├бРђЮРѓг├бРђЮРѓг */
        .lib-header {
            display: flex; align-items: center; gap: 1rem;
            padding: 0 2rem; height: 60px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .lib-logo { font-size: 1.1rem; font-weight: 800; white-space: nowrap; }
        .lib-logo span {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .lib-sub { font-size: 0.82rem; color: var(--muted); }
        .h-spacer { flex: 1; }
        .h-btn {
            font-size: 0.78rem; color: var(--muted); cursor: pointer;
            padding: 0.3rem 0.75rem; border: 1px solid var(--border); border-radius: 7px;
            background: none; font-family: inherit; text-decoration: none; transition: all 0.2s; white-space: nowrap;
        }
        .h-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
        .h-btn.purple { color: #c084fc; border-color: rgba(168,85,247,0.4); }
        .h-btn.purple:hover { background: rgba(168,85,247,0.15); color: #fff; }

        /* ├бРђЮРѓг├бРђЮРѓг Body ├бРђЮРѓг├бРђЮРѓг */
        .lib-body { padding: 2rem; max-width: 1400px; margin: 0 auto; }

        /* ├бРђЮРѓг├бРђЮРѓг Section header ├бРђЮРѓг├бРђЮРѓг */
        .sec-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.25rem; margin-top: 2.5rem; }
        .sec-header:first-child { margin-top: 0; }
        .sec-title { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
        .sec-badge { font-size: 0.68rem; font-weight: 700; color: var(--accent); background: rgba(99,102,241,0.12); padding: 0.1rem 0.45rem; border-radius: 20px; }

        /* ├бРђЮРѓг├бРђЮРѓг Grid ├бРђЮРѓг├бРђЮРѓг */
        .m-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }

        /* ├бРђЮРѓг├бРђЮРѓг Card ├бРђЮРѓг├бРђЮРѓг */
        .m-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
        .m-card:hover { border-color: rgba(99,102,241,0.35); box-shadow: 0 4px 24px rgba(99,102,241,0.1); }
        .card-thumb {
            height: 110px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1));
            position: relative; border-bottom: 1px solid var(--border);
        }
        .badge {
            position: absolute; font-size: 0.62rem; font-weight: 700;
            padding: 0.15rem 0.42rem; border-radius: 5px; color: #fff; backdrop-filter: blur(4px);
        }
        .badge-cam  { top: 0.5rem; right: 0.5rem; background: rgba(99,102,241,0.85); }
        .badge-clips{ top: 0.5rem; left:  0.5rem; background: rgba(168,85,247,0.8); }
        .card-body { padding: 1rem; }
        .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; line-height: 1.3; }
        .card-meta { font-size: 0.72rem; color: var(--muted); display: flex; flex-direction: column; gap: 0.1rem; margin-bottom: 0.8rem; }
        .cam-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
        .cam-pill { font-size: 0.62rem; font-weight: 600; padding: 0.13rem 0.38rem; border-radius: 4px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--muted); }

        /* ├бРђЮРѓг├бРђЮРѓг Buttons ├бРђЮРѓг├бРђЮРѓг */
        .card-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.25rem;
            padding: 0.35rem 0.7rem; border-radius: 8px; border: none;
            font-family: inherit; font-size: 0.77rem; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: all 0.15s; white-space: nowrap;
        }
        .btn-play { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; flex: 1; justify-content: center; }
        .btn-play:hover { opacity: 0.88; }
        .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { background: rgba(168,85,247,0.12); border-color: rgba(168,85,247,0.4); color: #c084fc; }
        .btn-danger { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: rgba(239,68,68,0.75); }
        .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.6); color: var(--danger); }
        .btn-sm { padding: 0.22rem 0.45rem; font-size: 0.68rem; border-radius: 6px; }

        /* ├бРђЮРѓг├бРђЮРѓг Clips ├бРђЮРѓг├бРђЮРѓг */
        .clips-section { margin-top: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.6rem; }
        .clips-toggle { display: flex; align-items: center; gap: 0.4rem; font-size: 0.7rem; font-weight: 700; color: var(--muted); cursor: pointer; user-select: none; transition: color 0.15s; }
        .clips-toggle:hover { color: var(--text); }
        .clips-arrow { font-size: 0.55rem; transition: transform 0.2s; margin-left: auto; }
        .clips-toggle.open .clips-arrow { transform: rotate(180deg); }
        .clips-list { display: none; flex-direction: column; gap: 0.3rem; margin-top: 0.5rem; }
        .clips-list.open { display: flex; }
        .clip-row { display: flex; align-items: center; gap: 0.35rem; padding: 0.32rem 0.5rem; border-radius: 7px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); font-size: 0.7rem; }
        .clip-time { font-weight: 700; color: var(--text); flex: 1; }
        .clip-tag { font-size: 0.6rem; color: var(--muted); background: rgba(255,255,255,0.06); padding: 0.1rem 0.3rem; border-radius: 3px; }

        /* ├бРђЮРѓг├бРђЮРѓг Empty ├бРђЮРѓг├бРђЮРѓг */
        .empty { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--muted); font-size: 0.9rem; line-height: 2; }
        .empty .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .empty a { color: var(--accent); text-decoration: none; font-weight: 600; }

        /* ├бРђЮРѓг├бРђЮРѓг Footer ├бРђЮРѓг├бРђЮРѓг */
        .lib-footer { text-align: center; padding: 2.5rem 1rem 2rem; color: rgba(255,255,255,0.12); font-size: 0.7rem; }
        #versionTrigger { cursor: pointer; padding: 0.3rem 0.5rem; border-radius: 5px; transition: all 0.2s; display: inline-block; }
        #versionTrigger:hover { color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.05); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    </style>
</head>
<body>

    <!-- ├бРђб┬љ├бРђб┬љ├бРђб┬љ ADMIN MODAL ├бРђб┬љ├бРђб┬љ├бРђб┬љ -->
    <div id="adminModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.72);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;min-width:300px;display:flex;flex-direction:column;gap:1rem;">
            <div style="font-weight:700;font-size:1rem;">├░┼ИРђЮРђЎ Acceso Admin</div>
            <input id="adminPinInput" type="password" placeholder="PIN" autocomplete="current-password"
                style="padding:0.6rem 0.9rem;border-radius:8px;border:1px solid var(--border);background:var(--surf2);color:var(--text);font-family:inherit;font-size:0.95rem;outline:none;" />
            <div id="adminPinError" style="color:#ef4444;font-size:0.78rem;display:none;"></div>
            <div style="display:flex;gap:0.5rem;">
                <button onclick="_submitAdminPin()" style="flex:1;padding:0.55rem;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:inherit;font-size:0.88rem;font-weight:700;cursor:pointer;">Entrar</button>
                <button onclick="_closeAdminModal()" style="padding:0.55rem 0.9rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;cursor:pointer;">Cancelar</button>
            </div>
            <div id="adminLogoutRow" style="display:none;border-top:1px solid var(--border);padding-top:0.75rem;">
                <button onclick="_adminLogout()" style="width:100%;padding:0.5rem;border-radius:8px;border:1px solid rgba(239,68,68,0.4);background:transparent;color:rgba(239,68,68,0.85);font-family:inherit;cursor:pointer;font-size:0.82rem;">├б┼ЊРђб Cerrar sesi├Ѓ┬│n admin</button>
            </div>
        </div>
    </div>

    <!-- ├бРђб┬љ├бРђб┬љ├бРђб┬љ HEADER ├бРђб┬љ├бРђб┬љ├бРђб┬љ -->
    <header class="lib-header">
        <div class="lib-logo">B-<span>Downloader</span></div>
        <span class="lib-sub">Biblioteca</span>
        <div class="h-spacer"></div>
        <a href="/manage" id="manageLink" class="h-btn purple admin-only" style="display:none">├б┬гРђА Gestionar descargas</a>
        <button id="adminTriggerBtn" onclick="_openAdminModal()" class="h-btn">├░┼ИРђЮРђЎ Admin</button>
    </header>

    <!-- ├бРђб┬љ├бРђб┬љ├бРђб┬љ MAIN ├бРђб┬љ├бРђб┬љ├бРђб┬љ -->
    <main class="lib-body">
        <div class="sec-header">
            <span class="sec-title">Partidos descargados</span>
            <span class="sec-badge" id="matchBadge">├бРѓгРђю</span>
        </div>
        <div class="m-grid" id="matchGrid">
            <div class="empty"><div class="icon">├б┬Ј┬│</div>Cargando partidos...</div>
        </div>

        <div id="orphanSection" style="display:none">
            <div class="sec-header">
                <span class="sec-title">Clips sin partido</span>
                <span class="sec-badge" id="orphanBadge">├бРѓгРђю</span>
            </div>
            <div class="m-grid" id="orphanGrid"></div>
        </div>
    </main>

    <!-- ├бРђб┬љ├бРђб┬љ├бРђб┬љ FOOTER ├бРѓгРђю acceso admin oculto ├бРђб┬љ├бРђб┬љ├бРђб┬љ -->
    <footer class="lib-footer">
        <span id="versionTrigger" title="Acceso de administrador">v{{ version }}</span>
    </footer>

    <script type="application/json" id="__serverData">{"isAdmin":{{ is_admin | tojson }},"forceAdminModal":{{ (_force_admin_modal is defined and _force_admin_modal) | tojson }}}</script>
    <script>
        const __sd = JSON.parse(document.getElementById('__serverData').textContent);
        let _isAdmin = __sd.isAdmin;
        const _forceAdminModal = __sd.forceAdminModal;

        // ├бРђЮРѓг├бРђЮРѓг Admin UI ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
        function _applyAdminUI() {
            document.querySelectorAll('.admin-only').forEach(el => { el.style.display = _isAdmin ? '' : 'none'; });
            const btn = document.getElementById('adminTriggerBtn');
            if (btn) btn.textContent = _isAdmin ? '├░┼ИРђЮРђю Admin' : '├░┼ИРђЮРђЎ Admin';
        }
        _applyAdminUI();

        // Hidden triggers: footer version text + Shift+A
        document.getElementById('versionTrigger').addEventListener('click', _openAdminModal);
        document.addEventListener('keydown', e => { if (e.shiftKey && e.key === 'A') _openAdminModal(); });

        // ├бРђЮРѓг├бРђЮРѓг Admin modal ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
        const adminModal     = document.getElementById('adminModal');
        const adminPinInput  = document.getElementById('adminPinInput');
        const adminPinError  = document.getElementById('adminPinError');
        const adminLogoutRow = document.getElementById('adminLogoutRow');

        function _openAdminModal() {
            adminPinError.style.display = 'none';
            adminPinInput.value = '';
            adminLogoutRow.style.display = _isAdmin ? '' : 'none';
            adminModal.style.display = 'flex';
            setTimeout(() => adminPinInput.focus(), 50);
        }
        function _closeAdminModal() { adminModal.style.display = 'none'; }
        adminModal.addEventListener('click', e => { if (e.target === adminModal) _closeAdminModal(); });
        adminPinInput.addEventListener('keydown', e => { if (e.key === 'Enter') _submitAdminPin(); });

        async function _submitAdminPin() {
            const pin = adminPinInput.value.trim();
            if (!pin) return;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                if (res.ok) {
                    _isAdmin = true;
                    _applyAdminUI();
                    _closeAdminModal();
                    if (_forceAdminModal) { window.location.href = '/manage'; }
                    else { loadLibrary(); }
                } else {
                    const d = await res.json().catch(() => ({}));
                    adminPinError.textContent = d.error || 'PIN incorrecto';
                    adminPinError.style.display = '';
                    adminPinInput.value = ''; adminPinInput.focus();
                }
            } catch { adminPinError.textContent = 'Error de conexi├Ѓ┬│n'; adminPinError.style.display = ''; }
        }

        async function _adminLogout() {
            await fetch('/api/admin/logout', { method: 'POST' });
            _isAdmin = false;
            _applyAdminUI();
            _closeAdminModal();
            loadLibrary();
        }

        // ├бРђЮРѓг├бРђЮРѓг Helpers ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
        const fmt = s => {
            s = Math.floor(s || 0);
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
            return h ? `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`
                     : `${m}:${String(ss).padStart(2,'0')}`;
        };

        // ├бРђЮРѓг├бРђЮРѓг Library loading ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
        async function loadLibrary() {
            document.getElementById('matchGrid').innerHTML = '<div class="empty"><div class="icon">├б┬Ј┬│</div>Cargando...</div>';
            try {
                const [vRes, cRes] = await Promise.all([fetch('/api/videos'), fetch('/api/clips')]);
                const { matches = [] } = await vRes.json();
                const { groups  = [] } = await cRes.json();

                const matchIds = new Set(matches.map(m => m.id));
                const clipsByMatch = {};
                const orphanClips  = [];
                groups.forEach(g => {
                    if (matchIds.has(g.match_id)) { clipsByMatch[g.match_id] = g.clips; }
                    else { g.clips.forEach(c => orphanClips.push(c)); }
                });

                document.getElementById('matchBadge').textContent = matches.length;
                renderMatches(matches, clipsByMatch);
                renderOrphans(orphanClips);
            } catch {
                document.getElementById('matchGrid').innerHTML = '<div class="empty"><div class="icon">├б┼А┬а├»┬И┬Ј</div>Error cargando la biblioteca</div>';
            }
        }

        function renderMatches(matches, clipsByMatch) {
            const grid = document.getElementById('matchGrid');
            if (!matches.length) {
                grid.innerHTML = `<div class="empty"><div class="icon">├░┼ИРђюРђџ</div>
                    No hay partidos descargados a├Ѓ┬║n.<br>
                    ${_isAdmin ? '<a href="/manage">├б┬гРђА Descargar partidos ├бРђаРђЎ</a>' : 'Contacta al administrador para agregar contenido.'}
                </div>`;
                return;
            }
            grid.innerHTML = '';
            matches.forEach(m => grid.appendChild(buildMatchCard(m, clipsByMatch[m.id] || [])));
        }

        function buildMatchCard(match, clips) {
            const totalMB = match.cameras.reduce((s, c) => s + c.size_mb, 0);
            const sz = totalMB > 1024 ? `${(totalMB/1024).toFixed(2)} GB` : `${totalMB.toFixed(0)} MB`;
            const title = match.title || `Partido #${match.id}`;
            const meta = [
                match.date    ? `├░┼ИРђюРђд ${match.date}` : null,
                match.complejo ? `├░┼И┬Ј┼И├»┬И┬Ј ${match.complejo}${match.cancha ? ` ├бРѓгРђю Cancha ${match.cancha}` : ''}` : null,
                `├░┼ИРђаРђЮ ${match.id} ├ѓ┬и ├░┼ИРђЎ┬Й ${sz}`
            ].filter(Boolean);

            const camPills = match.cameras.map(c => `<span class="cam-pill">${c.label}</span>`).join('');
            const card = document.createElement('div');
            card.className = 'm-card';
            card.innerHTML = `
                <div class="card-thumb">
                    ${match.cameras.length > 1 ? '├░┼И┼й┬Ц' : '├░┼ИРђю┬╣'}
                    <span class="badge badge-cam">${match.cameras.length} c├Ѓ┬Аm${match.cameras.length > 1 ? 's' : ''}</span>
                    ${clips.length ? `<span class="badge badge-clips">├б┼ЊРђџ ${clips.length}</span>` : ''}
                </div>
                <div class="card-body">
                    <div class="card-title">${title}</div>
                    <div class="card-meta">${meta.map(l => `<span>${l}</span>`).join('')}</div>
                    <div class="cam-pills">${camPills}</div>
                    <div class="card-actions">
                        <a href="/player?id=${match.id}" class="btn btn-play">├бРђЊ┬Х Reproducir</a>
                        ${_isAdmin ? `
                            <a href="/api/file_zip/${match.id}" class="btn btn-ghost" download title="Descargar ZIP">├б┬гРђА ZIP</a>
                            <button class="btn btn-danger" title="Eliminar partido" onclick="_deleteMatch('${match.id}',this)">├░┼ИРђћРђў</button>
                        ` : ''}
                    </div>
                    ${clips.length ? buildClipsSection(clips) : ''}
                </div>`;
            return card;
        }

        const CAM_LABEL = { central: 'Central', izq: 'Izq', der: 'Der' };

        function buildClipsSection(clips) {
            const rows = clips.map(c => {
                const dur = (c.start != null && c.end != null) ? c.end - c.start : null;
                return `<div class="clip-row">
                    <span class="clip-time">${fmt(c.start)} ├бРђаРђЎ ${fmt(c.end)}</span>
                    ${c.cam_id ? `<span class="clip-tag">${CAM_LABEL[c.cam_id] || c.cam_id}</span>` : ''}
                    ${dur ? `<span class="clip-tag">├б┬Ј┬▒ ${fmt(dur)}</span>` : ''}
                    <span class="clip-tag">${c.size_mb} MB</span>
                    <a href="/api/clips/stream/${encodeURIComponent(c.filename)}" target="_blank" class="btn btn-ghost btn-sm">├бРђЊ┬Х</a>
                    ${_isAdmin ? `
                        <a href="/api/clips/stream/${encodeURIComponent(c.filename)}" download="${c.filename}" class="btn btn-ghost btn-sm">├б┬гРђА</a>
                        <button class="btn btn-danger btn-sm" onclick="_deleteClip('${c.filename}',this)">├░┼ИРђћРђў</button>
                    ` : ''}
                </div>`;
            }).join('');
            return `<div class="clips-section">
                <div class="clips-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
                    ├б┼ЊРђџ ${clips.length} clip${clips.length > 1 ? 's' : ''}
                    <span class="clips-arrow">├бРђЊ┬╝</span>
                </div>
                <div class="clips-list">${rows}</div>
            </div>`;
        }

        function renderOrphans(orphans) {
            const sec  = document.getElementById('orphanSection');
            const grid = document.getElementById('orphanGrid');
            if (!orphans.length) { sec.style.display = 'none'; return; }
            sec.style.display = '';
            document.getElementById('orphanBadge').textContent = orphans.length;
            grid.innerHTML = '';
            orphans.forEach(c => {
                const dur = (c.start != null && c.end != null) ? c.end - c.start : null;
                const card = document.createElement('div');
                card.className = 'm-card';
                card.innerHTML = `
                    <div class="card-thumb" style="height:80px;font-size:2.2rem;">├б┼ЊРђџ</div>
                    <div class="card-body">
                        <div class="card-title">${fmt(c.start)} ├бРђаРђЎ ${fmt(c.end)}</div>
                        <div class="card-meta">
                            ${c.cam_id ? `<span>├░┼И┼й┬Ц ${CAM_LABEL[c.cam_id] || c.cam_id}</span>` : ''}
                            ${dur ? `<span>├б┬Ј┬▒ ${fmt(dur)}</span>` : ''}
                            <span>├░┼ИРђЎ┬Й ${c.size_mb} MB</span>
                        </div>
                        <div class="card-actions">
                            <a href="/api/clips/stream/${encodeURIComponent(c.filename)}" target="_blank" class="btn btn-play">├бРђЊ┬Х Reproducir</a>
                            ${_isAdmin ? `
                                <a href="/api/clips/stream/${encodeURIComponent(c.filename)}" download="${c.filename}" class="btn btn-ghost">├б┬гРђА</a>
                                <button class="btn btn-danger" onclick="_deleteClip('${c.filename}',this)">├░┼ИРђћРђў</button>
                            ` : ''}
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        // ├бРђЮРѓг├бРђЮРѓг Acciones ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
        async function _deleteMatch(id, btn) {
            if (!confirm(`├ѓ┬┐Eliminar todos los archivos del partido ${id}?`)) return;
            btn.disabled = true;
            try {
                const res = await fetch(`/api/match/${id}`, { method: 'DELETE' });
                if (res.ok) { loadLibrary(); }
                else { const d = await res.json().catch(() => ({})); alert(d.error || 'Error al eliminar'); btn.disabled = false; }
            } catch { alert('Error de conexi├Ѓ┬│n'); btn.disabled = false; }
        }

        async function _deleteClip(filename, btn) {
            if (!confirm(`├ѓ┬┐Eliminar clip "${filename}"?`)) return;
            btn.disabled = true;
            try {
                const res = await fetch(`/api/clips/delete/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                if (res.ok) { loadLibrary(); }
                else { const d = await res.json().catch(() => ({})); alert(d.error || 'Error al eliminar'); btn.disabled = false; }
            } catch { alert('Error de conexi├Ѓ┬│n'); btn.disabled = false; }
        }

        // ├бРђЮРѓг├бРђЮРѓг Bootstrap ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
        loadLibrary();
        if (_forceAdminModal) _openAdminModal();
    </script>
</body>
