<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B-Downloader – Biblioteca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d1117; --surface: #161b22; --surf2: #21262d;
            --border: rgba(255,255,255,0.08);
            --accent: #6366f1; --accent2: #a855f7;
            --text: #e6edf3; --muted: rgba(230,237,243,0.45);
            --danger: #ef4444;
        }
        html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; }

        /* ── Header ── */
        .lib-header {
            display: flex; align-items: center; gap: 1rem;
            padding: 0 2rem; height: 60px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .lib-logo { font-size: 1.1rem; font-weight: 800; white-space: nowrap; }
        .lib-logo span {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .lib-sub { font-size: 0.82rem; color: var(--muted); }
        .h-spacer { flex: 1; }
        .h-btn {
            font-size: 0.78rem; color: var(--muted); cursor: pointer;
            padding: 0.3rem 0.75rem; border: 1px solid var(--border); border-radius: 7px;
            background: none; font-family: inherit; text-decoration: none; transition: all 0.2s; white-space: nowrap;
        }
        .h-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
        .h-btn.purple { color: #c084fc; border-color: rgba(168,85,247,0.4); }
        .h-btn.purple:hover { background: rgba(168,85,247,0.15); color: #fff; }

        /* ── Body ── */
        .lib-body { padding: 2rem; max-width: 1400px; margin: 0 auto; }

        .library-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.3rem; }
        .view-switch, .calendar-nav { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .view-btn, .calendar-btn {
            padding: 0.38rem 0.8rem; border-radius: 9px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: var(--muted); font-family: inherit;
            font-size: 0.76rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .view-btn:hover, .calendar-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.22); }
        .view-btn.active { color: #fff; background: rgba(99,102,241,0.18); border-color: rgba(99,102,241,0.45); }
        .calendar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .calendar-label { min-width: 170px; text-align: center; font-size: 0.8rem; font-weight: 700; color: var(--text); }

        /* ── Section header ── */
        .sec-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.25rem; margin-top: 2.5rem; }
        .sec-header:first-child { margin-top: 0; }
        .sec-title { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
        .sec-badge { font-size: 0.68rem; font-weight: 700; color: var(--accent); background: rgba(99,102,241,0.12); padding: 0.1rem 0.45rem; border-radius: 20px; }

        /* ── Grid ── */
        .m-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }

        .calendar-shell { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 0.75rem; }
        .calendar-weekday {
            text-align: center; font-size: 0.67rem; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 0.15rem;
        }
        .calendar-pad { min-height: 0; }
        .calendar-day {
            min-height: 150px; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.65rem; display: flex; flex-direction: column; gap: 0.55rem;
        }
        .calendar-day.is-empty { background: transparent; }
        .calendar-day.has-matches { border-color: rgba(99,102,241,0.22); box-shadow: inset 0 0 0 1px rgba(99,102,241,0.08); }
        .calendar-day-head { display: flex; align-items: center; justify-content: space-between; gap: 0.4rem; }
        .calendar-day-number { font-size: 0.82rem; font-weight: 700; color: var(--muted); }
        .calendar-day.has-matches .calendar-day-number { color: var(--text); }
        .calendar-day-count {
            font-size: 0.62rem; font-weight: 700; color: var(--accent); background: rgba(99,102,241,0.12);
            padding: 0.12rem 0.38rem; border-radius: 999px;
        }
        .calendar-day-matches { display: flex; flex-direction: column; gap: 0.45rem; }
        .calendar-match {
            display: flex; flex-direction: column; gap: 0.2rem; padding: 0.45rem 0.55rem; border-radius: 10px;
            text-decoration: none; background: linear-gradient(135deg, rgba(99,102,241,0.16), rgba(168,85,247,0.12));
            border: 1px solid rgba(99,102,241,0.24); color: var(--text); transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
        }
        .calendar-match:hover { transform: translateY(-1px); border-color: rgba(168,85,247,0.45); box-shadow: 0 6px 18px rgba(99,102,241,0.12); }
        .calendar-match-title { font-size: 0.72rem; font-weight: 700; line-height: 1.25; }
        .calendar-match-meta, .calendar-match-footer { font-size: 0.62rem; color: rgba(230,237,243,0.72); line-height: 1.25; }

        /* ── Card ── */
        .m-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
        .m-card:hover { border-color: rgba(99,102,241,0.35); box-shadow: 0 4px 24px rgba(99,102,241,0.1); }
        .card-thumb {
            height: 110px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1));
            position: relative; border-bottom: 1px solid var(--border);
        }
        .badge {
            position: absolute; font-size: 0.62rem; font-weight: 700;
            padding: 0.15rem 0.42rem; border-radius: 5px; color: #fff; backdrop-filter: blur(4px);
        }
        .badge-cam  { top: 0.5rem; right: 0.5rem; background: rgba(99,102,241,0.85); }
        .badge-clips{ top: 0.5rem; left:  0.5rem; background: rgba(168,85,247,0.8); }
        .card-body { padding: 1rem; }
        .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; line-height: 1.3; }
        .card-meta { font-size: 0.72rem; color: var(--muted); display: flex; flex-direction: column; gap: 0.1rem; margin-bottom: 0.8rem; }
        .cam-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
        .cam-pill { font-size: 0.62rem; font-weight: 600; padding: 0.13rem 0.38rem; border-radius: 4px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--muted); }

        /* ── Buttons ── */
        .card-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.25rem;
            padding: 0.35rem 0.7rem; border-radius: 8px; border: none;
            font-family: inherit; font-size: 0.77rem; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: all 0.15s; white-space: nowrap;
        }
        .btn-play { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; flex: 1; justify-content: center; }
        .btn-play:hover { opacity: 0.88; }
        .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { background: rgba(168,85,247,0.12); border-color: rgba(168,85,247,0.4); color: #c084fc; }
        .btn-danger { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: rgba(239,68,68,0.75); }
        .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.6); color: var(--danger); }
        .btn-sm { padding: 0.22rem 0.45rem; font-size: 0.68rem; border-radius: 6px; }

        /* ── Clips ── */
        .clips-section { margin-top: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.6rem; }
        .clips-toggle { display: flex; align-items: center; gap: 0.4rem; font-size: 0.7rem; font-weight: 700; color: var(--muted); cursor: pointer; user-select: none; transition: color 0.15s; }
        .clips-toggle:hover { color: var(--text); }
        .clips-arrow { font-size: 0.55rem; transition: transform 0.2s; margin-left: auto; }
        .clips-toggle.open .clips-arrow { transform: rotate(180deg); }
        .clips-list { display: none; flex-direction: column; gap: 0.3rem; margin-top: 0.5rem; }
        .clips-list.open { display: flex; }
        .clip-row { display: flex; align-items: center; gap: 0.35rem; padding: 0.32rem 0.5rem; border-radius: 7px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); font-size: 0.7rem; }
        .clip-time { font-weight: 700; color: var(--text); flex: 1; }
        .clip-tag { font-size: 0.6rem; color: var(--muted); background: rgba(255,255,255,0.06); padding: 0.1rem 0.3rem; border-radius: 3px; }

        /* ── Empty ── */
        .empty { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--muted); font-size: 0.9rem; line-height: 2; }
        .empty .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .empty a { color: var(--accent); text-decoration: none; font-weight: 600; }

        /* ── Footer ── */
        .lib-footer { text-align: center; padding: 2.5rem 1rem 2rem; color: rgba(255,255,255,0.12); font-size: 0.7rem; }
        #versionTrigger { cursor: pointer; padding: 0.3rem 0.5rem; border-radius: 5px; transition: all 0.2s; display: inline-block; }
        #versionTrigger:hover { color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.05); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        /* ── Admin Modal ── */
        .modal-overlay { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.72); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; min-width:300px; display:flex; flex-direction:column; gap:1rem; }
        .modal-title { font-weight:700; font-size:1rem; }
        .modal-input { padding:0.6rem 0.9rem; border-radius:8px; border:1px solid var(--border); background:var(--surf2); color:var(--text); font-family:inherit; font-size:0.95rem; outline:none; width:100%; }
        .modal-error { color:#ef4444; font-size:0.78rem; display:none; }
        .modal-row { display:flex; gap:0.5rem; }
        .modal-btn-confirm { flex:1; padding:0.55rem; border-radius:8px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-family:inherit; font-size:0.88rem; font-weight:700; cursor:pointer; }
        .modal-btn-cancel { padding:0.55rem 0.9rem; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:inherit; cursor:pointer; }
        .modal-logout-row { display:none; border-top:1px solid var(--border); padding-top:0.75rem; }
        .modal-btn-logout { width:100%; padding:0.5rem; border-radius:8px; border:1px solid rgba(239,68,68,0.4); background:transparent; color:rgba(239,68,68,0.85); font-family:inherit; cursor:pointer; font-size:0.82rem; }

        @media (max-width: 760px) {
            .lib-header { padding: 0.75rem 1rem; height: auto; flex-wrap: wrap; }
            .lib-body { padding: 1rem; }
            .calendar-label { min-width: 0; text-align: left; }
            .calendar-shell { overflow-x: auto; }
            .calendar-grid { min-width: 840px; }
        }
    </style>
</head>
<body>

    <!-- ═══ ADMIN MODAL ═══ -->
    <div id="adminModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">🔒 Acceso Admin</div>
            <input id="adminPinInput" class="modal-input" type="password" placeholder="PIN" autocomplete="current-password" />
            <div id="adminPinError" class="modal-error"></div>
            <div class="modal-row">
                <button onclick="_submitAdminPin()" class="modal-btn-confirm">Entrar</button>
                <button onclick="_closeAdminModal()" class="modal-btn-cancel">Cancelar</button>
            </div>
            <div id="adminLogoutRow" class="modal-logout-row">
                <button onclick="_adminLogout()" class="modal-btn-logout">✕ Cerrar sesión admin</button>
            </div>
        </div>
    </div>

    <!-- ═══ HEADER ═══ -->
    <header class="lib-header">
        <div class="lib-logo">B-<span>Downloader</span></div>
        <span class="lib-sub">Biblioteca</span>
        <div class="h-spacer"></div>
        <a href="/manage" id="manageLink" class="h-btn purple admin-only" style="display:none">⬇ Gestionar descargas</a>
        <button id="adminTriggerBtn" onclick="_openAdminModal()" class="h-btn">🔒 Admin</button>
    </header>

    <!-- ═══ MAIN ═══ -->
    <main class="lib-body">
        <div class="library-toolbar">
            <div class="view-switch">
                <button id="gridViewBtn" class="view-btn active" type="button">▦ Tarjetas</button>
                <button id="calendarViewBtn" class="view-btn" type="button">🗓 Calendario</button>
            </div>
            <div class="calendar-nav" id="calendarNav" style="display:none">
                <button id="prevMonthBtn" class="calendar-btn" type="button">← Mes anterior</button>
                <span id="calendarLabel" class="calendar-label">Calendario</span>
                <button id="nextMonthBtn" class="calendar-btn" type="button">Mes siguiente →</button>
            </div>
        </div>
        <div class="sec-header">
            <span class="sec-title">Partidos descargados</span>
            <span class="sec-badge" id="matchBadge">–</span>
        </div>
        <div class="m-grid" id="matchGrid">
            <div class="empty"><div class="icon">⏳</div>Cargando partidos...</div>
        </div>
        <div class="calendar-shell" id="calendarSection">
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div id="orphanSection" style="display:none">
            <div class="sec-header">
                <span class="sec-title">Clips sin partido</span>
                <span class="sec-badge" id="orphanBadge">–</span>
            </div>
            <div class="m-grid" id="orphanGrid"></div>
        </div>
    </main>

    <!-- ═══ FOOTER – acceso admin oculto ═══ -->
    <footer class="lib-footer">
        <span id="versionTrigger" title="Acceso de administrador">v{{ version }}</span>
    </footer>

    <script type="application/json" id="__serverData">{"isAdmin":{{ is_admin | tojson }},"forceAdminModal":{{ (_force_admin_modal is defined and _force_admin_modal) | tojson }}}</script>
    <script>
        const __sd = JSON.parse(document.getElementById('__serverData').textContent);
        let _isAdmin = __sd.isAdmin;
        const _forceAdminModal = __sd.forceAdminModal;

        // ── Admin UI ──────────────────────────────────────────────────
        function _applyAdminUI() {
            document.querySelectorAll('.admin-only').forEach(el => { el.style.display = _isAdmin ? '' : 'none'; });
            const btn = document.getElementById('adminTriggerBtn');
            if (btn) btn.textContent = _isAdmin ? '🔓 Admin' : '🔒 Admin';
        }
        _applyAdminUI();

        // Hidden triggers: footer version text + Shift+A
        document.getElementById('versionTrigger').addEventListener('click', _openAdminModal);
        document.addEventListener('keydown', e => { if (e.shiftKey && e.key === 'A') _openAdminModal(); });

        // ── Admin modal ───────────────────────────────────────────────
        const adminModal     = document.getElementById('adminModal');
        const adminPinInput  = document.getElementById('adminPinInput');
        const adminPinError  = document.getElementById('adminPinError');
        const adminLogoutRow = document.getElementById('adminLogoutRow');

        function _openAdminModal() {
            adminPinError.style.display = 'none';
            adminPinInput.value = '';
            adminLogoutRow.style.display = _isAdmin ? 'block' : 'none';
            adminModal.classList.add('open');
            setTimeout(() => adminPinInput.focus(), 50);
        }
        function _closeAdminModal() { adminModal.classList.remove('open'); }
        adminModal.addEventListener('click', e => { if (e.target === adminModal) _closeAdminModal(); });
        adminPinInput.addEventListener('keydown', e => { if (e.key === 'Enter') _submitAdminPin(); });

        async function _submitAdminPin() {
            const pin = adminPinInput.value.trim();
            if (!pin) return;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                if (res.ok) {
                    _isAdmin = true;
                    _applyAdminUI();
                    _closeAdminModal();
                    if (_forceAdminModal) { window.location.href = '/manage'; }
                    else { loadLibrary(); }
                } else {
                    const d = await res.json().catch(() => ({}));
                    adminPinError.textContent = d.error || 'PIN incorrecto';
                    adminPinError.style.display = '';
                    adminPinInput.value = ''; adminPinInput.focus();
                }
            } catch { adminPinError.textContent = 'Error de conexión'; adminPinError.style.display = ''; }
        }

        async function _adminLogout() {
            await fetch('/api/admin/logout', { method: 'POST' });
            _isAdmin = false;
            _applyAdminUI();
            _closeAdminModal();
            loadLibrary();
        }

        // ── Helpers ───────────────────────────────────────────────────
        const fmt = s => {
            s = Math.floor(s || 0);
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
            return h ? `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`
                     : `${m}:${String(ss).padStart(2,'0')}`;
        };
        const escapeHtml = value =>
            String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        const matchGrid = document.getElementById('matchGrid');
        const calendarSection = document.getElementById('calendarSection');
        const calendarGrid = document.getElementById('calendarGrid');
        const gridViewBtn = document.getElementById('gridViewBtn');
        const calendarViewBtn = document.getElementById('calendarViewBtn');
        const calendarNav = document.getElementById('calendarNav');
        const calendarLabel = document.getElementById('calendarLabel');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');

        let _currentView = 'grid';
        let _allMatches = [];
        let _clipsByMatch = {};
        let _calendarMonths = [];
        let _calendarIndex = -1;

        const parseMatchDate = value => {
            if (!/^\d{4}-\d{2}-\d{2}$/.test(value || '')) return null;
            const [year, month, day] = value.split('-').map(Number);
            return new Date(year, month - 1, day, 12);
        };
        const formatMonthLabel = date => {
            const label = new Intl.DateTimeFormat('es-AR', { month: 'long', year: 'numeric' }).format(date);
            return label.charAt(0).toUpperCase() + label.slice(1);
        };
        const compareMatches = (a, b) => {
            const aDate = parseMatchDate(a.date);
            const bDate = parseMatchDate(b.date);
            if (aDate && bDate && aDate.getTime() !== bDate.getTime()) return bDate - aDate;
            if (aDate) return -1;
            if (bDate) return 1;
            return String(b.id).localeCompare(String(a.id), 'es');
        };

        function setLibraryView(view) {
            _currentView = view;
            const isCalendar = view === 'calendar';
            matchGrid.style.display = isCalendar ? 'none' : 'grid';
            calendarSection.style.display = isCalendar ? '' : 'none';
            calendarNav.style.display = (isCalendar && _calendarMonths.length) ? '' : 'none';
            gridViewBtn.classList.toggle('active', !isCalendar);
            calendarViewBtn.classList.toggle('active', isCalendar);
            if (isCalendar) renderCalendar(_allMatches, _clipsByMatch);
        }

        function initCalendarMonths(matches) {
            const currentKey = _calendarMonths[_calendarIndex] || null;
            _calendarMonths = [...new Set(matches
                .map(match => /^\d{4}-\d{2}-\d{2}$/.test(match.date || '') ? match.date.slice(0, 7) : null)
                .filter(Boolean))].sort();
            if (!_calendarMonths.length) {
                _calendarIndex = -1;
                return;
            }
            const nextIndex = currentKey ? _calendarMonths.indexOf(currentKey) : -1;
            _calendarIndex = nextIndex >= 0 ? nextIndex : _calendarMonths.length - 1;
        }

        function renderLibrary() {
            if (_currentView === 'calendar') renderCalendar(_allMatches, _clipsByMatch);
            else renderMatches(_allMatches, _clipsByMatch);
        }

        gridViewBtn.addEventListener('click', () => setLibraryView('grid'));
        calendarViewBtn.addEventListener('click', () => setLibraryView('calendar'));
        prevMonthBtn.addEventListener('click', () => {
            if (_calendarIndex > 0) {
                _calendarIndex -= 1;
                renderCalendar(_allMatches, _clipsByMatch);
            }
        });
        nextMonthBtn.addEventListener('click', () => {
            if (_calendarIndex >= 0 && _calendarIndex < _calendarMonths.length - 1) {
                _calendarIndex += 1;
                renderCalendar(_allMatches, _clipsByMatch);
            }
        });

        // ── Library loading ───────────────────────────────────────────
        async function loadLibrary() {
            matchGrid.innerHTML = '<div class="empty"><div class="icon">⏳</div>Cargando...</div>';
            calendarGrid.innerHTML = '<div class="empty"><div class="icon">🗓️</div>Cargando calendario...</div>';
            try {
                const [vRes, cRes] = await Promise.all([fetch('/api/videos'), fetch('/api/clips')]);
                const { matches = [] } = await vRes.json();
                const { groups  = [] } = await cRes.json();

                const matchIds = new Set(matches.map(m => m.id));
                const clipsByMatch = {};
                const orphanClips  = [];
                groups.forEach(g => {
                    if (matchIds.has(g.match_id)) { clipsByMatch[g.match_id] = g.clips; }
                    else { g.clips.forEach(c => orphanClips.push(c)); }
                });

                const sortedMatches = matches.slice().sort(compareMatches);
                _allMatches = sortedMatches;
                _clipsByMatch = clipsByMatch;
                initCalendarMonths(sortedMatches);

                document.getElementById('matchBadge').textContent = sortedMatches.length;
                renderLibrary();
                renderOrphans(orphanClips);
            } catch {
                const errorHtml = '<div class="empty"><div class="icon">⚠️</div>Error cargando la biblioteca</div>';
                matchGrid.innerHTML = errorHtml;
                calendarGrid.innerHTML = errorHtml;
            }
        }

        function renderMatches(matches, clipsByMatch) {
            const grid = matchGrid;
            if (!matches.length) {
                grid.innerHTML = `<div class="empty"><div class="icon">📂</div>
                    No hay partidos descargados aún.<br>
                    ${_isAdmin ? '<a href="/manage">⬇ Descargar partidos →</a>' : 'Contacta al administrador para agregar contenido.'}
                </div>`;
                return;
            }
            grid.innerHTML = '';
            matches.forEach(m => grid.appendChild(buildMatchCard(m, clipsByMatch[m.id] || [])));
        }

        function renderCalendar(matches, clipsByMatch) {
            const datedMatches = matches.filter(match => parseMatchDate(match.date));
            if (!_calendarMonths.length || !datedMatches.length) {
                calendarLabel.textContent = 'Sin fechas disponibles';
                prevMonthBtn.disabled = true;
                nextMonthBtn.disabled = true;
                calendarNav.style.display = 'none';
                calendarGrid.innerHTML = '<div class="empty"><div class="icon">🗓️</div>No hay partidos con fecha registrada todavía.</div>';
                return;
            }

            const monthKey = _calendarMonths[_calendarIndex];
            const [year, month] = monthKey.split('-').map(Number);
            const monthDate = new Date(year, month - 1, 1, 12);
            const firstWeekday = (monthDate.getDay() + 6) % 7;
            const daysInMonth = new Date(year, month, 0).getDate();
            const weekdayNames = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

            const monthMatches = datedMatches
                .filter(match => match.date.startsWith(monthKey))
                .sort((a, b) => parseMatchDate(a.date) - parseMatchDate(b.date) || String(a.title || a.id).localeCompare(String(b.title || b.id), 'es'));

            const matchesByDate = {};
            monthMatches.forEach(match => {
                if (!matchesByDate[match.date]) matchesByDate[match.date] = [];
                matchesByDate[match.date].push(match);
            });

            calendarLabel.textContent = `${formatMonthLabel(monthDate)} · ${monthMatches.length} partido${monthMatches.length === 1 ? '' : 's'}`;
            prevMonthBtn.disabled = _calendarIndex <= 0;
            nextMonthBtn.disabled = _calendarIndex >= _calendarMonths.length - 1;

            let html = weekdayNames.map(day => `<div class="calendar-weekday">${day}</div>`).join('');
            for (let i = 0; i < firstWeekday; i += 1) html += '<div class="calendar-pad"></div>';

            for (let day = 1; day <= daysInMonth; day += 1) {
                const dateKey = `${monthKey}-${String(day).padStart(2, '0')}`;
                const dayMatches = matchesByDate[dateKey] || [];
                html += `
                    <div class="calendar-day ${dayMatches.length ? 'has-matches' : 'is-empty'}">
                        <div class="calendar-day-head">
                            <span class="calendar-day-number">${day}</span>
                            ${dayMatches.length ? `<span class="calendar-day-count">${dayMatches.length}</span>` : ''}
                        </div>
                        ${dayMatches.length ? `<div class="calendar-day-matches">${dayMatches.map(match => {
                            const clipCount = (clipsByMatch[match.id] || []).length;
                            const location = match.complejo
                                ? `${match.complejo}${match.cancha ? ` · Cancha ${match.cancha}` : ''}`
                                : `ID ${match.id}`;
                            return `<a class="calendar-match" href="/player?id=${encodeURIComponent(match.id)}">
                                <span class="calendar-match-title">${escapeHtml(match.title || `Partido #${match.id}`)}</span>
                                <span class="calendar-match-meta">${escapeHtml(location)}</span>
                                <span class="calendar-match-footer">${match.cameras.length} cám${match.cameras.length === 1 ? '' : 's'}${clipCount ? ` · ✂ ${clipCount}` : ''}</span>
                            </a>`;
                        }).join('')}</div>` : ''}
                    </div>`;
            }

            calendarGrid.innerHTML = html;
        }

        function buildMatchCard(match, clips) {
            const totalMB = match.cameras.reduce((s, c) => s + c.size_mb, 0);
            const sz = totalMB > 1024 ? `${(totalMB/1024).toFixed(2)} GB` : `${totalMB.toFixed(0)} MB`;
            const title = match.title || `Partido #${match.id}`;
            const safeMatchId = encodeURIComponent(match.id);
            const meta = [
                match.date    ? `📅 ${match.date}` : null,
                match.complejo ? `🏟️ ${match.complejo}${match.cancha ? ` – Cancha ${match.cancha}` : ''}` : null,
                `🆔 ${match.id} · 💾 ${sz}`
            ].filter(Boolean);

            const camPills = match.cameras.map(c => `<span class="cam-pill">${escapeHtml(c.label)}</span>`).join('');
            const card = document.createElement('div');
            card.className = 'm-card';
            card.innerHTML = `
                <div class="card-thumb">
                    ${match.cameras.length > 1 ? '🎥' : '📹'}
                    <span class="badge badge-cam">${match.cameras.length} cám${match.cameras.length > 1 ? 's' : ''}</span>
                    ${clips.length ? `<span class="badge badge-clips">✂ ${clips.length}</span>` : ''}
                </div>
                <div class="card-body">
                    <div class="card-title">${escapeHtml(title)}</div>
                    <div class="card-meta">${meta.map(l => `<span>${escapeHtml(l)}</span>`).join('')}</div>
                    <div class="cam-pills">${camPills}</div>
                    <div class="card-actions">
                        <a href="/player?id=${safeMatchId}" class="btn btn-play">▶ Partido</a>
                        ${clips.length ? `<a href="/player?id=${safeMatchId}&view=clips" class="btn btn-ghost">✂ ${clips.length} clip${clips.length>1?'s':''}</a>` : ''}
                        ${_isAdmin ? `
                            <a href="/api/file_zip/${safeMatchId}" class="btn btn-ghost" download title="Descargar ZIP">⬇ ZIP</a>
                            <button class="btn btn-danger" title="Eliminar partido" data-match-id="${safeMatchId}" onclick="_deleteMatch(decodeURIComponent(this.dataset.matchId),this)">🗑</button>
                        ` : ''}
                    </div>
                    ${clips.length ? buildClipsSection(clips) : ''}
                </div>`;
            return card;
        }

        const CAM_LABEL = { central: 'Central', izq: 'Izq', der: 'Der' };

        function buildClipsSection(clips) {
            const rows = clips.map(c => {
                const dur = (c.start != null && c.end != null) ? c.end - c.start : null;
                const safeFilename = encodeURIComponent(c.filename);
                return `<div class="clip-row">
                    <span class="clip-tag">✂ ${escapeHtml(c.name || c.filename)}</span>
                    <span class="clip-time">${fmt(c.start)} → ${fmt(c.end)}</span>
                    ${c.cam_id ? `<span class="clip-tag">${escapeHtml(CAM_LABEL[c.cam_id] || c.cam_id)}</span>` : ''}
                    ${dur ? `<span class="clip-tag">⏱ ${fmt(dur)}</span>` : ''}
                    <span class="clip-tag">${c.size_mb} MB</span>
                    <a href="/api/clips/stream/${safeFilename}" target="_blank" class="btn btn-ghost btn-sm">▶</a>
                    ${_isAdmin ? `
                        <a href="/api/clips/download/${safeFilename}" download="${escapeHtml(c.download_name || c.filename)}" class="btn btn-ghost btn-sm">⬇</a>
                        <button class="btn btn-danger btn-sm" data-filename="${safeFilename}" onclick="_deleteClip(decodeURIComponent(this.dataset.filename),this)">🗑</button>
                    ` : ''}
                </div>`;
            }).join('');
            return `<div class="clips-section">
                <div class="clips-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
                    ✂ ${clips.length} clip${clips.length > 1 ? 's' : ''}
                    <span class="clips-arrow">▼</span>
                </div>
                <div class="clips-list">${rows}</div>
            </div>`;
        }

        function renderOrphans(orphans) {
            const sec  = document.getElementById('orphanSection');
            const grid = document.getElementById('orphanGrid');
            if (!orphans.length) { sec.style.display = 'none'; return; }
            sec.style.display = '';
            document.getElementById('orphanBadge').textContent = orphans.length;
            grid.innerHTML = '';
            orphans.forEach(c => {
                const dur = (c.start != null && c.end != null) ? c.end - c.start : null;
                const safeFilename = encodeURIComponent(c.filename);
                const card = document.createElement('div');
                card.className = 'm-card';
                card.innerHTML = `
                    <div class="card-thumb" style="height:80px;font-size:2.2rem;">✂</div>
                    <div class="card-body">
                        <div class="card-title">${escapeHtml(c.name || c.filename)}</div>
                        <div class="card-meta">
                            <span>${fmt(c.start)} → ${fmt(c.end)}</span>
                            ${c.cam_id ? `<span>🎥 ${escapeHtml(CAM_LABEL[c.cam_id] || c.cam_id)}</span>` : ''}
                            ${dur ? `<span>⏱ ${fmt(dur)}</span>` : ''}
                            <span>💾 ${c.size_mb} MB</span>
                        </div>
                        <div class="card-actions">
                            <a href="/api/clips/stream/${safeFilename}" target="_blank" class="btn btn-play">▶ Reproducir</a>
                            ${_isAdmin ? `
                                <a href="/api/clips/download/${safeFilename}" download="${escapeHtml(c.download_name || c.filename)}" class="btn btn-ghost">⬇</a>
                                <button class="btn btn-danger" data-filename="${safeFilename}" onclick="_deleteClip(decodeURIComponent(this.dataset.filename),this)">🗑</button>
                            ` : ''}
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        // ── Acciones ──────────────────────────────────────────────────
        async function _deleteMatch(id, btn) {
            if (!confirm(`¿Eliminar todos los archivos del partido ${id}?`)) return;
            btn.disabled = true;
            try {
                const res = await fetch(`/api/match/${id}`, { method: 'DELETE' });
                if (res.ok) { loadLibrary(); }
                else { const d = await res.json().catch(() => ({})); alert(d.error || 'Error al eliminar'); btn.disabled = false; }
            } catch { alert('Error de conexión'); btn.disabled = false; }
        }

        async function _deleteClip(filename, btn) {
            if (!confirm(`¿Eliminar clip "${filename}"?`)) return;
            btn.disabled = true;
            try {
                const res = await fetch(`/api/clips/delete/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                if (res.ok) { loadLibrary(); }
                else { const d = await res.json().catch(() => ({})); alert(d.error || 'Error al eliminar'); btn.disabled = false; }
            } catch { alert('Error de conexión'); btn.disabled = false; }
        }

        // ── Bootstrap ─────────────────────────────────────────────────
        loadLibrary();
        if (_forceAdminModal) _openAdminModal();
    </script>
</body>
</html>
